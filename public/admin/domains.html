<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>OIDC Admin - Domains</title>
<link rel="stylesheet" href="/assets/admin.css">
</head>
<body>
<div class="layout">
  <nav class="sidebar"></nav>
  <div class="main">
    <h1 id="pageTitle"></h1>
    <div class="card">
      <div style="display:flex;gap:8px;margin-bottom:20px">
        <input type="text" id="newDomain" style="flex:1">
        <button class="btn btn-primary" onclick="addDomain()" id="addBtn"></button>
      </div>
      <table>
        <thead><tr><th id="thDomain"></th><th style="width:80px" id="thActions"></th></tr></thead>
        <tbody id="domainList"></tbody>
      </table>
      <div id="empty" class="empty" style="display:none"></div>
    </div>
  </div>
</div>
<script src="/assets/i18n.js"></script>
<script>
const API = '/api/admin';
const token = localStorage.getItem('admin_token');
if (!token) window.location.href = '/admin/index.html';
const headers = { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` };

renderSidebar('domains');
document.getElementById('pageTitle').textContent = t('domains_title');
document.getElementById('newDomain').placeholder = t('domains_placeholder');
document.getElementById('addBtn').textContent = t('domains_add');
document.getElementById('thDomain').textContent = t('domains_th_domain');
document.getElementById('thActions').textContent = t('domains_th_actions');
document.getElementById('empty').textContent = t('domains_empty');

function logout() { localStorage.removeItem('admin_token'); window.location.href = '/admin/index.html'; }
function toast(msg) { const el = document.createElement('div'); el.className = 'toast'; el.textContent = msg; document.body.appendChild(el); setTimeout(() => el.remove(), 2000); }

async function api(path, opts = {}) {
  const res = await fetch(`${API}${path}`, { headers, ...opts });
  if (res.status === 401) { logout(); return; }
  return res.json();
}

async function loadDomains() {
  const data = await api('/domains');
  const list = document.getElementById('domainList');
  const empty = document.getElementById('empty');
  if (!data.domains.length) { list.innerHTML = ''; empty.style.display = 'block'; return; }
  empty.style.display = 'none';
  list.innerHTML = data.domains.map(d => `
    <tr>
      <td>${esc(d)}</td>
      <td><button class="btn btn-danger btn-sm" onclick="delDomain('${esc(d)}')">${t('delete_btn')}</button></td>
    </tr>
  `).join('');
}

async function addDomain() {
  const input = document.getElementById('newDomain');
  const domain = input.value.trim().toLowerCase();
  if (!domain) return;
  await api('/domains', { method: 'POST', body: JSON.stringify({ domain }) });
  input.value = '';
  toast(t('domains_added'));
  loadDomains();
}

async function delDomain(domain) {
  if (!confirm(`${t('domains_confirm')} "${domain}"?`)) return;
  await api('/domains', { method: 'DELETE', body: JSON.stringify({ domain }) });
  toast(t('domains_removed'));
  loadDomains();
}

document.getElementById('newDomain').addEventListener('keydown', e => { if (e.key === 'Enter') addDomain(); });
function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
loadDomains();
</script>
</body>
</html>
