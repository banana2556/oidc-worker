<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>OIDC Admin - Login Codes</title>
<link rel="icon" href="/favicon.png" type="image/png">
<link rel="stylesheet" href="/assets/admin.css">
<style>
.hint{color:var(--text-muted);font-size:12px;line-height:1.5;margin-top:6px}
.inline-check{display:inline-flex;align-items:center;gap:8px;margin:0;color:var(--text);font-size:13px;cursor:pointer}
.usage-row{display:flex;gap:12px;align-items:center;flex-wrap:wrap}
.usage-input{max-width:160px}
.usage-muted{color:var(--text-muted);font-size:12px;margin-top:4px}
.code-cell{display:inline-flex;align-items:center;gap:8px;max-width:100%}
.code-cell code{font-size:12px;word-break:break-all}
</style>
</head>
<body>
<div class="layout">
  <nav class="sidebar"></nav>
  <div class="main">
    <h1 id="pageTitle"></h1>

    <div class="card">
      <h3 style="font-size:15px;margin-bottom:16px" id="createTitle"></h3>
      <div class="form-group">
        <label for="newCode" id="lCode"></label>
        <input type="text" id="newCode" autocomplete="off">
        <div class="hint" id="autoHint"></div>
      </div>
      <div class="form-group">
        <label for="maxUses" id="lMaxUses"></label>
        <div class="usage-row">
          <input type="number" id="maxUses" class="usage-input" min="1" step="1">
          <label class="inline-check"><input type="checkbox" id="unlimited" onchange="toggleUnlimited()"><span id="lUnlimited"></span></label>
        </div>
      </div>
      <button class="btn btn-primary" onclick="addCode()" id="createBtn"></button>
    </div>

    <div class="card">
      <h3 style="font-size:15px;margin-bottom:16px" id="registeredTitle"></h3>
      <div class="table-wrap">
        <table>
          <thead><tr><th id="thCode"></th><th id="thUsage"></th><th id="thCreated"></th><th style="width:80px" id="thActions"></th></tr></thead>
          <tbody id="codeList"></tbody>
        </table>
      </div>
      <div id="empty" class="empty" style="display:none"></div>
      <div id="pagination"></div>
    </div>
  </div>
</div>
<script src="/site-config.js"></script>
<script src="/assets/i18n.js"></script>
<script>
const API = '/api/admin';
const token = localStorage.getItem('admin_token');
if (!token) window.location.href = '/admin/index.html';
const headers = { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` };

async function initPage() {
  const secRes = await fetch(`${API}/security`, { headers });
  const secData = secRes.ok ? await secRes.json() : {};
  const loginCodeEnabled = secData.security ? secData.security.login_code_enabled : true;
  renderSidebar('login-codes', { loginCodeEnabled });

  if (!loginCodeEnabled) {
    document.getElementById('pageTitle').textContent = t('login_codes_title');
    document.querySelector('.main').innerHTML = `
      <h1>${t('login_codes_title')}</h1>
      <div class="card" style="text-align:center;padding:48px">
        <p style="color:var(--text-muted);font-size:15px;margin-bottom:16px">${t('nav_login_codes_disabled')}</p>
        <a href="/admin/branding.html" class="btn btn-primary">${t('nav_branding')}</a>
      </div>`;
    return;
  }

  setupPage();
}

function setupPage() {
renderSidebar('login-codes', { loginCodeEnabled: true });
document.getElementById('pageTitle').textContent = t('login_codes_title');
document.getElementById('createTitle').textContent = t('login_codes_create_title');
document.getElementById('lCode').textContent = t('login_codes_code_label');
document.getElementById('newCode').placeholder = t('login_codes_code_placeholder');
document.getElementById('autoHint').textContent = t('login_codes_auto_hint');
document.getElementById('lMaxUses').textContent = t('login_codes_max_uses_label');
document.getElementById('maxUses').placeholder = t('login_codes_max_uses_placeholder');
document.getElementById('lUnlimited').textContent = t('login_codes_unlimited');
document.getElementById('createBtn').textContent = t('login_codes_create_btn');
document.getElementById('registeredTitle').textContent = t('login_codes_registered');
document.getElementById('thCode').textContent = t('login_codes_th_code');
document.getElementById('thUsage').textContent = t('login_codes_th_usage');
document.getElementById('thCreated').textContent = t('login_codes_th_created');
document.getElementById('thActions').textContent = t('login_codes_th_actions');
document.getElementById('empty').textContent = t('login_codes_empty');

function logout() { localStorage.removeItem('admin_token'); window.location.href = '/admin/index.html'; }
function toast(msg) { const el = document.createElement('div'); el.className = 'toast'; el.textContent = msg; document.body.appendChild(el); setTimeout(() => el.remove(), 2000); }

async function api(path, opts = {}) {
  const res = await fetch(`${API}${path}`, { headers, ...opts });
  if (res.status === 401) { logout(); return; }
  const data = await res.json().catch(() => ({}));
  if (!res.ok) {
    toast(data.error || 'Request failed');
    throw new Error(data.error || 'Request failed');
  }
  return data;
}

function toggleUnlimited() {
  const unlimited = document.getElementById('unlimited').checked;
  const maxUses = document.getElementById('maxUses');
  maxUses.disabled = unlimited;
  if (unlimited) maxUses.value = '';
}

function fmtDate(s) { if (!s) return '-'; return new Date(s).toLocaleString(); }

function fmtUsage(code) {
  if (code.max_uses === null) return `${code.used} / ${t('login_codes_unlimited')}`;
  return `${code.used} / ${code.max_uses}`;
}

const pager = createPager('codes', 'pagination', function(codes, total) {
  const list = document.getElementById('codeList');
  const empty = document.getElementById('empty');
  if (total === 0) { list.innerHTML = ''; empty.style.display = 'block'; return; }
  empty.style.display = 'none';
  list.innerHTML = codes.map(code => {
    const fullCode = code.code || '';
    const displayCode = fullCode || code.code_hint || '-';
    const copyButton = fullCode
      ? `<button class="icon-btn" data-code="${attr(fullCode)}" onclick="copyCode(this.dataset.code)" title="${attr(t('login_codes_copy'))}" aria-label="${attr(t('login_codes_copy'))}"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg></button>`
      : '';
    const legacyNote = fullCode ? '' : `<div class="usage-muted">${t('login_codes_legacy_hidden')}</div>`;
    return `
      <tr>
        <td><span class="code-cell"><code>${esc(displayCode)}</code>${copyButton}</span>${legacyNote}</td>
        <td><span>${esc(fmtUsage(code))}</span>${code.max_uses !== null && code.used >= code.max_uses ? `<div class="usage-muted">${t('login_codes_exhausted')}</div>` : ''}</td>
        <td style="font-size:13px;color:var(--text-muted)">${esc(fmtDate(code.created_at))}</td>
        <td><button class="btn btn-danger btn-sm" onclick="delCode('${attr(code.id)}')">${t('delete_btn')}</button></td>
      </tr>
    `;
  }).join('');
}, 'auto');

async function loadCodes() {
  const data = await api('/login-codes');
  pager.setData(data.login_codes || []);
}

async function addCode() {
  const code = document.getElementById('newCode').value.trim();
  const unlimited = document.getElementById('unlimited').checked;
  const maxUsesValue = document.getElementById('maxUses').value.trim();
  if (!unlimited && (!maxUsesValue || Number(maxUsesValue) < 1)) { toast(t('login_codes_bad_limit')); return; }
  const payload = { max_uses: unlimited ? null : Number(maxUsesValue) };
  if (code) payload.code = code;
  await api('/login-codes', { method: 'POST', body: JSON.stringify(payload) });
  document.getElementById('newCode').value = '';
  document.getElementById('maxUses').value = '';
  document.getElementById('unlimited').checked = false;
  toggleUnlimited();
  toast(t('login_codes_added'));
  loadCodes();
}

async function delCode(id) {
  if (!confirm(t('login_codes_confirm'))) return;
  await api('/login-codes', { method: 'DELETE', body: JSON.stringify({ id }) });
  toast(t('login_codes_deleted'));
  loadCodes();
}

function copyCode(text) {
  navigator.clipboard.writeText(text).then(() => toast(t('login_codes_copied')));
}

document.getElementById('newCode').addEventListener('keydown', e => { if (e.key === 'Enter') addCode(); });
document.getElementById('maxUses').addEventListener('keydown', e => { if (e.key === 'Enter') addCode(); });
loadCodes();
} // end setupPage

function esc(s) { const d = document.createElement('div'); d.textContent = String(s); return d.innerHTML; }
function attr(s) { return esc(s).replace(/"/g, '&quot;'); }
initPage();
</script>
</body>
</html>
